<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="nginxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="flaskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="pgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <linearGradient id="dockerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#172a45;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bgGrad)" rx="16"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="900" height="580" fill="url(#grid)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700" letter-spacing="1">Task Manager — Docker Architecture</text>
  <text x="450" y="62" text-anchor="middle" fill="#64748b" font-size="12">Nginx · Flask×2 · PostgreSQL · Redis</text>

  <!-- ═══ Docker Network Container ═══ -->
  <rect x="260" y="80" width="580" height="460" rx="14" fill="url(#dockerGrad)" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.9"/>
  <rect x="270" y="73" width="170" height="24" rx="6" fill="#2563eb"/>
  <text x="355" y="89" text-anchor="middle" fill="white" font-size="11" font-weight="600">🐳 Docker Network</text>

  <!-- ═══ INTERNET / CLIENT ═══ -->
  <rect x="30" y="220" width="110" height="80" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="252" text-anchor="middle" font-size="26">🌐</text>
  <text x="85" y="274" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Internet</text>
  <text x="85" y="290" text-anchor="middle" fill="#475569" font-size="10">Client Browser</text>

  <!-- Arrow: Internet → Nginx -->
  <line x1="140" y1="255" x2="278" y2="255" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="0"/>
  <rect x="152" y="240" width="74" height="18" rx="4" fill="#0f172a" opacity="0.8"/>
  <text x="189" y="252" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">:443 HTTPS</text>
  <text x="189" y="270" text-anchor="middle" fill="#64748b" font-size="9">:80 → redirect</text>

  <!-- ═══ NGINX ═══ -->
  <rect x="280" y="200" width="140" height="110" rx="12" fill="url(#nginxGrad)" filter="url(#shadow)"/>
  <text x="350" y="235" text-anchor="middle" font-size="30">⚡</text>
  <text x="350" y="258" text-anchor="middle" fill="white" font-size="14" font-weight="700">Nginx</text>
  <text x="350" y="274" text-anchor="middle" fill="#bbf7d0" font-size="10">nginx:alpine</text>
  <text x="350" y="291" text-anchor="middle" fill="#dcfce7" font-size="9">SSL · LB · Proxy</text>

  <!-- Nginx badges -->
  <rect x="285" y="300" width="62" height="16" rx="4" fill="#14532d"/>
  <text x="316" y="312" text-anchor="middle" fill="#4ade80" font-size="9">least_conn</text>
  <rect x="352" y="300" width="62" height="16" rx="4" fill="#14532d"/>
  <text x="383" y="312" text-anchor="middle" fill="#4ade80" font-size="9">rate limit</text>

  <!-- Arrow: Nginx → Flask1 -->
  <path d="M 420 230 Q 470 200 490 200" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="460" y="196" text-anchor="middle" fill="#38bdf8" font-size="9">upstream</text>

  <!-- Arrow: Nginx → Flask2 -->
  <path d="M 420 275 Q 470 300 490 300" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- ═══ FLASK 1 ═══ -->
  <rect x="490" y="155" width="130" height="100" rx="12" fill="url(#flaskGrad)" filter="url(#shadow)"/>
  <text x="555" y="188" text-anchor="middle" font-size="24">🐍</text>
  <text x="555" y="210" text-anchor="middle" fill="white" font-size="13" font-weight="700">flask1</text>
  <text x="555" y="226" text-anchor="middle" fill="#bae6fd" font-size="10">gunicorn -w 2</text>
  <text x="555" y="241" text-anchor="middle" fill="#e0f2fe" font-size="9">:8000</text>

  <!-- SERVER_NAME badge -->
  <rect x="500" y="248" width="110" height="16" rx="4" fill="#0c4a6e"/>
  <text x="555" y="260" text-anchor="middle" fill="#38bdf8" font-size="9">SERVER_NAME=flask1</text>

  <!-- ═══ FLASK 2 ═══ -->
  <rect x="490" y="300" width="130" height="100" rx="12" fill="url(#flaskGrad)" filter="url(#shadow)"/>
  <text x="555" y="333" text-anchor="middle" font-size="24">🐍</text>
  <text x="555" y="355" text-anchor="middle" fill="white" font-size="13" font-weight="700">flask2</text>
  <text x="555" y="371" text-anchor="middle" fill="#bae6fd" font-size="10">gunicorn -w 2</text>
  <text x="555" y="386" text-anchor="middle" fill="#e0f2fe" font-size="9">:8000</text>

  <!-- SERVER_NAME badge -->
  <rect x="500" y="393" width="110" height="16" rx="4" fill="#0c4a6e"/>
  <text x="555" y="405" text-anchor="middle" fill="#38bdf8" font-size="9">SERVER_NAME=flask2</text>

  <!-- Arrow: Flask1 → Postgres -->
  <path d="M 620 205 Q 680 205 700 260" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- Arrow: Flask2 → Postgres -->
  <path d="M 620 350 Q 680 350 700 340" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- Arrow: Flask1 → Redis -->
  <path d="M 620 215 Q 720 180 740 430" stroke="#f87171" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>

  <!-- Arrow: Flask2 → Redis -->
  <path d="M 620 355 Q 730 390 740 440" stroke="#f87171" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>

  <!-- ═══ POSTGRESQL ═══ -->
  <rect x="690" y="260" width="130" height="105" rx="12" fill="url(#pgGrad)" filter="url(#shadow)"/>
  <text x="755" y="295" text-anchor="middle" font-size="24">🐘</text>
  <text x="755" y="318" text-anchor="middle" fill="white" font-size="13" font-weight="700">PostgreSQL</text>
  <text x="755" y="334" text-anchor="middle" fill="#c7d2fe" font-size="10">postgres:16-alpine</text>
  <text x="755" y="350" text-anchor="middle" fill="#e0e7ff" font-size="9">:5432</text>

  <!-- pgdata volume badge -->
  <rect x="695" y="358" width="120" height="16" rx="4" fill="#312e81"/>
  <text x="755" y="370" text-anchor="middle" fill="#a5b4fc" font-size="9">📦 volume: pgdata</text>

  <!-- ═══ REDIS ═══ -->
  <rect x="690" y="415" width="130" height="100" rx="12" fill="url(#redisGrad)" filter="url(#shadow)"/>
  <text x="755" y="448" text-anchor="middle" font-size="24">⚡</text>
  <text x="755" y="470" text-anchor="middle" fill="white" font-size="13" font-weight="700">Redis</text>
  <text x="755" y="486" text-anchor="middle" fill="#fecaca" font-size="10">redis:7-alpine</text>
  <text x="755" y="502" text-anchor="middle" fill="#fee2e2" font-size="9">:6379 · TTL 30s</text>

  <!-- ═══ STATIC FILES note ═══ -->
  <rect x="280" y="430" width="180" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="370" y="452" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">📁 Static Files</text>
  <text x="370" y="468" text-anchor="middle" fill="#64748b" font-size="10">Nginx serves CSS directly</text>
  <text x="370" y="482" text-anchor="middle" fill="#64748b" font-size="10">without hitting Flask</text>

  <!-- Arrow: Nginx → Static -->
  <path d="M 350 310 L 350 430" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="362" y="380" fill="#4ade80" font-size="9">/static/</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="30" y="400" width="210" height="145" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="135" y="422" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700">LEGEND</text>

  <line x1="46" y1="440" x2="80" y2="440" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="88" y="444" fill="#94a3b8" font-size="10">HTTPS / Proxy</text>

  <line x1="46" y1="460" x2="80" y2="460" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="88" y="464" fill="#94a3b8" font-size="10">DB Connection</text>

  <line x1="46" y1="480" x2="80" y2="480" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="88" y="484" fill="#94a3b8" font-size="10">Cache (Redis)</text>

  <line x1="46" y1="500" x2="80" y2="500" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="88" y="504" fill="#94a3b8" font-size="10">Static Files</text>

  <line x1="46" y1="520" x2="80" y2="520" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="88" y="524" fill="#94a3b8" font-size="10">Docker Network</text>

  <!-- Health check indicators -->
  <circle cx="414" cy="155" r="6" fill="#4ade80" filter="url(#glow)"/>
  <text x="424" y="159" fill="#4ade80" font-size="9">healthy</text>
  <circle cx="414" cy="300" r="6" fill="#4ade80" filter="url(#glow)"/>
  <text x="424" y="304" fill="#4ade80" font-size="9">healthy</text>
  <circle cx="826" cy="260" r="6" fill="#4ade80" filter="url(#glow)"/>
  <text x="836" y="264" fill="#4ade80" font-size="9">healthy</text>
  <circle cx="826" cy="415" r="6" fill="#4ade80" filter="url(#glow)"/>
  <text x="836" y="419" fill="#4ade80" font-size="9">healthy</text>

  <!-- Footer -->
  <text x="450" y="568" text-anchor="middle" fill="#334155" font-size="10">Docker Advanced Course — Lab 7 · Task Manager · Momen Lotfy</text>
</svg>
